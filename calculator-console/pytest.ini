[pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
markers =
    unit: Hızlı, izole birim testleri (çoğunluk)
    integration: Modüllerin birlikte çalışması (mock I/O)
    system: Gerçek süreç / subprocess ile uçtan uca
    uat: Kabul senaryoları — yayın öncesi manuel veya yavaş otomatik doğrulama
    web: Flask test client ile HTTP katmanı testleri
    ui: Playwright tarayıcı UI testleri
addopts = -ra -q
