# Üretim kalıbı: PostgreSQL + Redis + FastAPI (api) + Next.js (ui).
# DB/Redis dışarıya port açmaz; yalnızca api ve ui yayınlanır.
#
#   docker compose --env-file .env.production -f docker-compose.prod.yml up -d --build
#
# Tarayıcıdan erişilen API kökü (NEXT_PUBLIC_API_BASE) ui imajı build sırasında gömülür;
# örn. https://api.sizin-domain.com veya tek hostta https://sizin-domain.com:8000
#
# Seed (tek seferlik):
#   docker compose --env-file .env.production -f docker-compose.prod.yml run --rm api python -m app.seed

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - storium_pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8000}:8000"
    environment:
      SECRET_KEY: ${SECRET_KEY}
      DATABASE_URL: postgresql+psycopg2://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: db
      DB_PORT: "5432"
      REDIS_URL: redis://redis:6379/1
      CORS_ORIGINS: ${CORS_ORIGINS}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-noreply@storium.local}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      RUN_SEED: ${RUN_SEED:-false}
      SEED_DEMO_USER: ${SEED_DEMO_USER:-false}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5)",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  ui:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:8000}
    restart: unless-stopped
    ports:
      - "${UI_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  storium_pgdata_prod:
