services:
  postgres:
    image: postgres:16
    container_name: teklif-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: teklif
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d teklif"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: ./api-python
    container_name: teklif-api
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/teklif
      API_HOST: 0.0.0.0
      API_PORT: 8000
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8001:8000"

  web:
    build:
      context: ./web
      args:
        VITE_API_URL: /api
    container_name: teklif-web
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  postgres_data:
