# Kullanım: docker compose -f docker-compose.mysql.yml up --build
services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db_app01
    ports:
      - "3306:3306"
    volumes:
      - mysqldata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s

  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      HOST: 0.0.0.0
      PORT: "8000"
      DB_BACKEND: mysql
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      MYSQL_DATABASE: db_app01
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysqldata:
