<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Tasks{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/superhero/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <style>
        :root {
            --ds-radius: 0.5rem;
            --ds-shadow: 0 0.125rem 0.5rem rgba(0, 0, 0, 0.35);
        }
        body { min-height: 100vh; display: flex; flex-direction: column; }
        .navbar-brand { font-weight: 700; letter-spacing: -0.02em; }
        main.flex-grow-1 { padding-top: 1.5rem; padding-bottom: 2rem; }
        .ds-page-title {
            font-weight: 600;
            letter-spacing: -0.02em;
            color: var(--bs-heading-color);
        }
        .ds-card {
            border-radius: var(--ds-radius);
            box-shadow: var(--ds-shadow);
            border-color: var(--bs-border-color);
        }
        .table thead th {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--bs-secondary-color);
            border-bottom-width: 1px;
        }
        .task-id-cell { font-family: var(--bs-font-monospace); font-size: 0.75rem; max-width: 8rem; overflow: hidden; text-overflow: ellipsis; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-body">
<nav class="navbar navbar-expand-md navbar-dark bg-primary shadow-sm">
    <div class="container">
        <a class="navbar-brand" href="{{ url_for('tasks.home') }}">Task app</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain" aria-controls="navMain" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMain">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="{{ url_for('tasks.task_list') }}">Tasks</a></li>
            </ul>
        </div>
    </div>
</nav>
<main class="flex-grow-1">
    <div class="container py-3">
        {% with flashes = get_flashed_messages(with_categories=true) %}
        {% if flashes %}
        <div class="mb-3">
            {% for category, message in flashes %}
            <div class="alert alert-{% if category == 'error' %}danger{% elif category == 'success' %}success{% elif category == 'warning' %}warning{% else %}info{% endif %} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            {% endfor %}
        </div>
        {% endif %}
        {% endwith %}
        {% block content %}{% endblock %}
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
