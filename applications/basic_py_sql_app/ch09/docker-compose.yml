name: tasks-ch09

x-db-env: &db-env
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres
  POSTGRES_DB: tasks

services:
  db:
    image: postgres:16-alpine
    environment: *db-env
    volumes:
      - pgdata_ch09:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tasks"]
      interval: 3s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8030:8000"
    environment:
      <<: *db-env
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      SECRET_KEY: ch09-docker-change-me
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/', timeout=2)",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 50s

volumes:
  pgdata_ch09:
