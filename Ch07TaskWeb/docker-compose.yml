services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ch07taskweb-backend
    environment:
      - DATABASE_URL=sqlite:////data/tasks.db
    volumes:
      - backend-data:/data
    expose:
      - "8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api
    container_name: ch07taskweb-frontend
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_started

volumes:
  backend-data:
